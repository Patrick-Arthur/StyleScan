<ion-content [fullscreen]="true" class="auth-shell">
  <div class="auth-page">
    <section class="auth-hero card-shell">
      <div>
        <span class="eyebrow">Password Help</span>
        <h1>Recupere o acesso com calma.</h1>
        <p>Se o email existir na base, o app segue com a orientacao de recuperacao sem expor seus dados.</p>
      </div>
      <div class="hero-badge">
        <ion-icon name="key-outline"></ion-icon>
      </div>
    </section>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()" class="auth-form card-shell">
      <div class="form-head">
        <span class="eyebrow">Recuperacao</span>
        <h2>Informe seu email</h2>
      </div>

      <label class="field-card">
        <span>Email</span>
        <ion-input type="email" formControlName="email" placeholder="voce@email.com"></ion-input>
      </label>

      <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" class="error-message">
        <span *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">Email e obrigatorio.</span>
        <span *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">Email invalido.</span>
      </div>

      <div class="feedback-chip success" *ngIf="submitted">
        <ion-icon name="mail-open-outline"></ion-icon>
        <span>Se o email existir, enviaremos as instrucoes de recuperacao.</span>
      </div>

      <ion-button expand="block" shape="round" type="submit" [disabled]="forgotPasswordForm.invalid">
        Enviar link de recuperacao
      </ion-button>

      <div class="auth-links">
        <button type="button" class="ghost-link" (click)="goToLogin()">Voltar ao login</button>
        <button type="button" class="ghost-link" (click)="goToRegister()">Criar conta</button>
      </div>
    </form>
  </div>
</ion-content>
